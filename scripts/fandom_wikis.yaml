  # `Charcat`'s title does not say "infobox" and its own source carries no
  # <infobox> markup — it just calls `Charcat/deep`, which does. Declared, like
  # `categories`, because nothing about the wrapper itself is derivable. The
  # `Characters` category above stays the entry point; this only types the
  # infobox so the pages it fills get parsed.
  infoboxes: {PERSON: [Charcat]}

# ---------------------------------------------------------------------------
# Enumerated from their infoboxes, not from a category (STU-558). No category
# name reaches these 5: they have no character root at all, they partition the
# cast on another axis — profession (`harrypotter`: `Wizards`, 3795), gender
# (`wot`: `Men` 1213 / `Women` 1284), in-world era (`pern`: `Ninth Pass`, 738),
# book and status (`thehungergames`: `Deceased characters`, 192), species
# (`twilightsaga`: `Humans` 128, which excludes the vampires, i.e. the cast).
# Their location/organisation roots exist but hold subcategories, not pages
# (harrypotter `Locations`: 31 members against 2419 location pages).
#
# The infobox is what those pages do share. Counts below are mainspace
# transclusions, measured per wiki; the out-of-fiction infoboxes are the reason
# this is a per-type declaration and not "every infobox on the wiki" —
# harrypotter's `Actor infobox` fills 3025 pages and `Person infobox` 413 (J. K.
# Rowling, the illustrators), thehungergames' `Actor` 223.
# ---------------------------------------------------------------------------

- wiki: https://harrypotter.fandom.com
  lang: en
  infoboxes:
    PERSON: [Individual infobox]                   # 5154 pages
    PLACE: [Location infobox]                      # 2419
    ORG: [Organisation infobox, Family infobox]    # 476 + 387 (`House of Black`)

- wiki: https://pern.fandom.com
  lang: en
  infoboxes:
    # Dragons are named characters here (`Ramoth`, `Mnementh`), not scenery.
    PERSON: [Infobox show character, Infobox show dragonkind]   # 1970 + 559
    PLACE: [Infobox show hold, Infobox show place, Infobox show weyr]  # 135 + 65 + 18
    # A Craft is the guild, not its hall: `Harper Hall`, `Smithcraft`.
    ORG: [Infobox show craft]                                   # 45

- wiki: https://thehungergames.fandom.com
  lang: en
  types: [PERSON, PLACE]
  infoboxes:
    PERSON: [Character]              # 353
    PLACE: [Location, District]      # 41 + 14

- wiki: https://twilightsaga.fandom.com
  lang: en
  types: [PERSON, ORG]
  infoboxes:
    # The cast is typed by species; `Renesmee` carries two of these.
    PERSON: [Human infobox, Vampire infobox, Shape shifter infobox, Hybrid infobox]
    ORG: [Coven infobox, Pack infobox]   # 18 + 3
    # `Actor infobox` (71) is deliberately absent — out of fiction.

- wiki: https://wot.fandom.com
  lang: en
  types: [PERSON, PLACE]
  infoboxes:
    PERSON: [Character]   # 2469
    PLACE: [Nation]       # 31

