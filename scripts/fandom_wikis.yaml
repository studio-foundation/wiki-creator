# ---------------------------------------------------------------------------
# Verified to exist, deliberately NOT listed — a category name override cannot
# reach them. These wikis have no character/location category root at all: they
# partition the cast on a different axis, so no single category names it.
#
#   harrypotter     24612 articles. 6987 categories, none a character root; the
#                   cast lives under profession (`Wizards`, 3795).
#   wot             6562. Partitions by gender: `Men` (1213) / `Women` (1284).
#   pern            3247. Partitions by in-world era and role: `Dragonrider`
#                   (299), `Holder` (241), `Ninth Pass` (738).
#   thehungergames  911. Partitions per book (`Sunrise on the Reaping
#                   characters`, 100) and by status (`Deceased characters`, 192).
#   twilightsaga    895. Only `Minor characters` (144) / `Mentioned characters`
#                   (89); `Humans` (128) excludes the vampires, i.e. the cast.
#
# Reaching them needs a different entry point, not a longer category list:
# `list=embeddedin` on the infobox template. Pages transcluding
# `Template:Infobox character` ARE the character pages regardless of how the
# wiki files them, and scrape_fandom_bulk.py already fetches that template list
# (fetch_infobox_template_titles) — it just doesn't enumerate from it. Verified
# on pern, which has zero usable categories and a clean template taxonomy:
# `Infobox show character` -> 500+ pages, `Infobox show hold` -> 135,
# `Infobox show place` -> 65.
#
# Excluded for other reasons:
#   wicked          768 articles, but the subject is the musical, not the
#                   novels (`Actors from Wicked`, 330).
#   Ranger's        No wiki found. Every candidate slug failed; `ranger`
#     Apprentice    resolves to RangerWiki (26362 articles) — Power Rangers.
# ---------------------------------------------------------------------------
