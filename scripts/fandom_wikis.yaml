# Curated fandom.com wiki list for scrape_fandom_bulk.py.
#
#   python scripts/scrape_fandom_bulk.py --wikis scripts/fandom_wikis.yaml \
#       --out-dir processing_output/fandom_corpus --workers 3
#
# Hand-curated, not generated. Slug guessing from a title was tried and does not
# work: the guessable slug is often a squatted namesake, and every gate we can
# automate (does it resolve, does it have members) confirms a wiki is ALIVE,
# never that it is the RIGHT one. Measured: "Malazan Book of the Fallen" guesses
# `mbf` -> "Matthew Ballester Fragments Wiki" (32 articles); "Hollow Star Saga"
# guesses `hss` -> "High School Story Wiki" (685 articles, 50 characters, passes
# every check). Every slug below was verified against action=query&meta=siteinfo
# and its sitename read.
#
# `categories` is per-wiki because a category name is a property of the wiki, not
# a fact we can derive. Verified via list=allcategories on each: the plain
# "Characters"/"Locations"/"Organizations" default holds on barely half of them.
# Real names in use: `Personnage` (singular, fr), `Humans`, `Character` (singular),
# `Places`, `Geography`, `Groups`, `Factions`, and prefixed forms like
# `The Shadowhunter Chronicles characters`.
#
# `infobox_templates` is per-wiki for the same reason, and is only needed where
# BOTH derivable tests fail. A template is taken as an infobox if its title says
# "infobox" (a convention) or its source carries <infobox> markup (Portable
# Infobox). `Charcat` on warriors is the only one in this list that says
# neither: its own source is one call to `Charcat/deep`, which holds the markup.
#
# Book wikis only. Wikis whose subject is the screen adaptation are excluded even
# when they are larger: `gameofthrones` (Wiki of Westeros, 5576 articles) covers
# the TV series, so A Song of Ice and Fire points at `iceandfire` (2562) instead.

