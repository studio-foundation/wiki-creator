[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wiki-creator"
version = "0.1.0"
description = "Generate wiki pages from EPUB books via entity extraction"
requires-python = ">=3.11"
dependencies = [
    "ebooklib>=0.18",
    "beautifulsoup4>=4.12",
    "spacy>=3.7",
    "lxml>=5.0",
    "anthropic>=0.40",
    "pyyaml>=6.0",
    "fastcoref>=2.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "mypy>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["wiki_creator"]
