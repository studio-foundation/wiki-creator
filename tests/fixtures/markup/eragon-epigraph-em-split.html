<!-- 01_eragon.epub (Christopher Paolini, Knopf) :: text00070.html
     Epigraph whose initial sits outside the <em> holding the rest of the
     sentence: "L" + "orem" must close up.
     The space before the final period is the publisher's own -- the source really
     is "</em>&#13;\n .", and whitespace between a tag edge and a period renders as
     a space in any reader. Preserving it is correct; closing it up would be us
     silently rewriting the book. -->
<p class="extract">L<em>orem ipsum dolor sit amet consectetur elit</em>&#13;
 .</p>
