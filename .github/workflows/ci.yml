name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

# A newer push to the same branch/PR supersedes an in-flight run — cancel the
# stale one instead of spending runner minutes finishing it. `main` and the
# merge queue are never cancelled (their ref is unique per run).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history to diff the change range below

      # Docs-only changes (Markdown, docs/, LICENSE) can't affect the suite, so
      # skip the heavy steps for them. The job still runs and succeeds, so the
      # required status check reports green — a trigger-level `paths-ignore`
      # would instead leave the check pending and block a docs-only PR on
      # protected `main`. merge_group always runs the full suite (the queued
      # batch may mix docs and code).
      - name: Detect docs-only change
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
            head='${{ github.event.pull_request.head.sha }}'
          elif [ "${{ github.event_name }}" = "push" ]; then
            base='${{ github.event.before }}'
            head='${{ github.sha }}'
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if ! git rev-parse --quiet --verify "$base^{commit}" >/dev/null 2>&1; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          files=$(git diff --name-only "$base" "$head")
          echo "changed files:"; echo "$files"
          if [ -z "$files" ] || ! echo "$files" | grep -qvE '(^docs/|\.md$|^LICENSE$)'; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.changes.outputs.docs_only != 'true'
        with:
          python-version: "3.11"
          cache: pip

      # [dev] carries en_core_web_sm, so the NER-dependent tests run here.
      # The [models] extra (~1 GB of lg models) is a run-time need, not a test
      # one; tests needing fr_core_news_lg or the coref/gliner extras skip
      # cleanly (see tests/_markers.py) to keep CI fast.
      - name: Install package with dev dependencies
        if: steps.changes.outputs.docs_only != 'true'
        run: pip install -e ".[dev]"

      - name: Type-check
        if: steps.changes.outputs.docs_only != 'true'
        run: python -m mypy wiki_creator/

      # `-n auto` fans the suite across the runner's cores (pytest-xdist, in the
      # dev extra). No test shares mutable state, so it scales near-linearly —
      # measured ~2.4x on a 4-core runner.
      - name: Tests
        if: steps.changes.outputs.docs_only != 'true'
        run: python -m pytest -q -n auto

      # The e2e smoke test on the committed fixture novella (EPUB parse + NER
      # extraction). `pytest -q` above already collects it; running it as its own
      # named step gives a visible gate the milestones can require. It touches no
      # LLM — the resolution/generation stages are not exercised — so no provider
      # or API key is configured here.
      - name: Smoke test (fixture novella, no API key)
        if: steps.changes.outputs.docs_only != 'true'
        run: make smoke

      # One process per eval, never `pytest research/` — the dirs are hyphenated,
      # so they are not packages, so two evals in one process share a namespace
      # and `score` shadows `score` (research/README.md). Their own requirements
      # are not installed here; these suites cover the pure logic only.
      - name: Research eval suites
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          for eval in research/*-eval; do
            # a research-only spike ships no tests/ (graph-eval, STU-469)
            [ -d "$eval/tests" ] || continue
            echo "::group::$eval"
            (cd "$eval" && PYTHONPATH="$GITHUB_WORKSPACE" python -m pytest tests/ -q)
            echo "::endgroup::"
          done
