name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

# A newer push to the same branch/PR supersedes an in-flight run — cancel the
# stale one instead of spending runner minutes finishing it. `main` and the
# merge queue are never cancelled (their ref is unique per run).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history to diff the change range below

      # Changes that can't affect the Python suite — docs (Markdown, docs/,
      # LICENSE) and the self-contained `preview/` app (its own JS/vitest, no
      # Python impact) — skip the heavy steps. The job still runs and succeeds,
      # so the required status check reports green: a trigger-level
      # `paths-ignore` would instead leave the check pending and block such a PR
      # on protected `main`. merge_group always runs the full suite (the queued
      # batch may mix docs, preview and code). preview/ is covered by the
      # separate `preview` job below.
      - name: Detect Python-irrelevant change
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
            head='${{ github.event.pull_request.head.sha }}'
          elif [ "${{ github.event_name }}" = "push" ]; then
            base='${{ github.event.before }}'
            head='${{ github.sha }}'
          else
            echo "skip_python=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if ! git rev-parse --quiet --verify "$base^{commit}" >/dev/null 2>&1; then
            echo "skip_python=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          files=$(git diff --name-only "$base" "$head")
          echo "changed files:"; echo "$files"
          if [ -z "$files" ] || ! echo "$files" | grep -qvE '(^docs/|\.md$|^LICENSE$|^preview/)'; then
            echo "skip_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_python=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.changes.outputs.skip_python != 'true'
        with:
          python-version: "3.11"
          cache: pip

      # [dev] carries en_core_web_sm, so the NER-dependent tests run here.
      # The [models] extra (~1 GB of lg models) is a run-time need, not a test
      # one; tests needing fr_core_news_lg or the coref/gliner extras skip
      # cleanly (see tests/_markers.py) to keep CI fast.
      # The en_core_web_sm wheel is fetched from a GitHub release URL, which
      # intermittently 504s — retry the install so a transient gateway timeout
      # doesn't red an unrelated PR.
      - name: Install package with dev dependencies
        if: steps.changes.outputs.skip_python != 'true'
        run: |
          for attempt in 1 2 3; do
            pip install -e ".[dev]" && exit 0
            echo "pip install failed (attempt $attempt) — retrying in 15s"; sleep 15
          done
          exit 1

      - name: Type-check
        if: steps.changes.outputs.skip_python != 'true'
        run: python -m mypy wiki_creator/

      # `-n auto` fans the suite across the runner's cores (pytest-xdist, in the
      # dev extra). No test shares mutable state, so it scales near-linearly —
      # measured ~2.4x on a 4-core runner.
      - name: Tests
        if: steps.changes.outputs.skip_python != 'true'
        run: python -m pytest -q -n auto

      # The e2e smoke test on the committed fixture novella (EPUB parse + NER
      # extraction). `pytest -q` above already collects it; running it as its own
      # named step gives a visible gate the milestones can require. It touches no
      # LLM — the resolution/generation stages are not exercised — so no provider
      # or API key is configured here.
      - name: Smoke test (fixture novella, no API key)
        if: steps.changes.outputs.skip_python != 'true'
        run: make smoke

      # One process per eval, never `pytest research/` — the dirs are hyphenated,
      # so they are not packages, so two evals in one process share a namespace
      # and `score` shadows `score` (research/README.md). Their own requirements
      # are not installed here; these suites cover the pure logic only.
      - name: Research eval suites
        if: steps.changes.outputs.skip_python != 'true'
        run: |
          for eval in research/*-eval; do
            # a research-only spike ships no tests/ (graph-eval, STU-469)
            [ -d "$eval/tests" ] || continue
            echo "::group::$eval"
            (cd "$eval" && PYTHONPATH="$GITHUB_WORKSPACE" python -m pytest tests/ -q)
            echo "::endgroup::"
          done

  # The preview app (M5.1) is a self-contained Vite/React project with its own
  # vitest suite. It runs only when preview/ changed, so a Python-only PR gets a
  # green no-op (same reasoning as the docs skip above), and a preview-only PR is
  # covered here without paying for — or being flaked by — the Python model
  # install. merge_group runs it unconditionally.
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect preview change
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
            head='${{ github.event.pull_request.head.sha }}'
          elif [ "${{ github.event_name }}" = "push" ]; then
            base='${{ github.event.before }}'
            head='${{ github.sha }}'
          else
            echo "preview_changed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if ! git rev-parse --quiet --verify "$base^{commit}" >/dev/null 2>&1; then
            echo "preview_changed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git diff --name-only "$base" "$head" | grep -qE '^preview/'; then
            echo "preview_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "preview_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.preview_changed == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: preview/package-lock.json

      - name: Install
        if: steps.changes.outputs.preview_changed == 'true'
        working-directory: preview
        run: npm ci

      - name: Tests
        if: steps.changes.outputs.preview_changed == 'true'
        working-directory: preview
        run: npm test

      - name: Build
        if: steps.changes.outputs.preview_changed == 'true'
        working-directory: preview
        run: npm run build
