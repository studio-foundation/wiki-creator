version: 1
entity_types:
  # STU-505: each type is the single authority for its NER labels and export
  # routing. `ner_labels` maps the (stock + custom fantasy-NER) labels this type
  # absorbs; a type with no `ner_labels` is generation-only (SYNOPSIS, COLLATION)
  # or the untyped fallback (OTHER). `export` holds what the presentation layer
  # needs — no Python table restates any of this.
  #
  # STU-521: `gliner_label` is the natural-language label the GLiNER backend asks
  # for to populate this type — with a zero-shot extractor the type vocabulary is
  # a prompt, not a training run. The wording is load-bearing (it moved FACTION 15
  # points in STU-470), so these are selected by `research/ner-eval/sweep_labels.py`
  # rather than guessed: re-run the sweep before changing one. A type with no
  # `gliner_label` is never asked for.
  PERSON:
    ner_labels: [PER, PERSON]
    gliner_label: person name
    export:
      subdir: characters
      full_key: persons
      infobox_template: Infobox character
      category_key: persons
      category_default: Personnages
      importance_categories: true
      tome_label_key: persons_by_tome
      infobox_source: |-
        <includeonly>
        {| class="infobox"
        |-
        ! colspan="2" | {{{name}}}
        |-
        | '''Aussi connu comme''' || {{{aliases|}}}
        |-
        | '''Titre(s)''' || {{{titles|}}}
        |-
        | '''Statut''' || {{{status|}}}
        |-
        | '''Espèce/Race''' || {{{species|}}}
        |-
        | '''Occupation''' || {{{occupation|}}}
        |-
        | '''Résidence''' || {{{residence|}}}
        |-
        | '''Affiliation''' || {{{affiliation|}}}
        |-
        | '''Première apparition''' || {{{first_seen|}}}
        |}
        </includeonly>
    infobox:
      - {token: nom,         group: infobox, provenance: batch-bound,    obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: type,        group: infobox, provenance: batch-bound,    obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: alias,       group: infobox, provenance: batch-bound,    obligation: OPT, tiers: [figurant, secondary, principal]}
      - {token: apparition,  group: infobox, provenance: batch-bound,    obligation: OPT, tiers: [figurant, secondary, principal]}
      - {token: status,      group: infobox, provenance: extracted-fact, obligation: MIN, fallback: unknown, tiers: [figurant, secondary, principal]}
      - {token: species,     group: infobox, provenance: extracted-fact, obligation: OPT, genre_gated: true, tiers: [secondary, principal]}
      - {token: affiliation, group: infobox, provenance: extracted-fact, obligation: OPT, tiers: [secondary, principal]}
      - {token: titles,      group: infobox, provenance: extracted-fact, obligation: OPT, tiers: [secondary, principal]}
    sections:
      - {token: biography,      group: section, provenance: llm-prose,      obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: backstory,      group: section, provenance: llm-prose,      obligation: OPT, tiers: [secondary, principal]}
      - {token: narrative_role, group: section, provenance: llm-prose,      obligation: OPT, tiers: [secondary, principal]}
      - {token: relationships, group: section, provenance: extracted-fact, obligation: OPT, tiers: [secondary, principal]}
      - {token: personality,   group: section, provenance: llm-prose,      obligation: OPT, tiers: [principal]}
      - {token: physical,      group: section, provenance: llm-prose,      obligation: OPT, tiers: [principal]}
      - {token: powers,        group: section, provenance: llm-prose,      obligation: OPT, genre_gated: true, tiers: [principal]}
      - {token: trivia,        group: section, provenance: llm-prose,      obligation: OPT, tiers: [principal]}
      - {token: references,    group: section, provenance: extracted-fact, obligation: MIN, fallback: none, tiers: [figurant, secondary, principal]}
  PLACE:
    ner_labels: [LOC, GPE, FAC, PLACE]
    gliner_label: place name
    export:
      subdir: locations
      full_key: places
      infobox_template: Infobox location
      category_key: locations
      category_default: Lieux
      tome_label_key: locations_by_tome
      infobox_source: |-
        <includeonly>
        {| class="infobox"
        |-
        ! colspan="2" | {{{name}}}
        |-
        | '''Type''' || {{{type|}}}
        |-
        | '''Localisation''' || {{{location|}}}
        |-
        | '''Première mention''' || {{{first_seen|}}}
        |-
        | '''Résidents notables''' || {{{residents|}}}
        |}
        </includeonly>
    infobox:
      - {token: nom,         group: infobox, provenance: batch-bound,    obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: type,        group: infobox, provenance: batch-bound,    obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: apparition,  group: infobox, provenance: batch-bound,    obligation: OPT, tiers: [figurant, secondary, principal]}
      - {token: location,    group: infobox, provenance: extracted-fact, obligation: OPT, tiers: [secondary, principal]}
    sections:
      - {token: biography,     group: section, provenance: llm-prose,      obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: physical,      group: section, provenance: llm-prose,      obligation: OPT, tiers: [principal]}
      - {token: events,        group: section, provenance: llm-prose,      obligation: OPT, tiers: [figurant, secondary, principal]}
      - {token: relationships, group: section, provenance: extracted-fact, obligation: OPT, tiers: [principal]}
      - {token: trivia,        group: section, provenance: llm-prose,      obligation: OPT, tiers: [principal]}
      - {token: references,    group: section, provenance: extracted-fact, obligation: MIN, fallback: none, tiers: [figurant, secondary, principal]}
  ORG:
    ner_labels: [ORG, NORP]
    gliner_label: "kingdom, empire, or government"
    export:
      subdir: organizations
      full_key: orgs
      infobox_template: Infobox organization
      category_key: organizations
      category_default: Organisations
      tome_label_key: organizations_by_tome
      infobox_source: |-
        <includeonly>
        {| class="infobox"
        |-
        ! colspan="2" | {{{name}}}
        |-
        | '''Type''' || {{{type|}}}
        |-
        | '''Leader(s)''' || {{{leaders|}}}
        |-
        | '''Membres notables''' || {{{members|}}}
        |-
        | '''Siège''' || {{{headquarters|}}}
        |-
        | '''Première mention''' || {{{first_seen|}}}
        |}
        </includeonly>
    infobox:
      - {token: nom,     group: infobox, provenance: batch-bound,    obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: type,    group: infobox, provenance: batch-bound,    obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: apparition, group: infobox, provenance: batch-bound, obligation: OPT, tiers: [figurant, secondary, principal]}
      - {token: leaders, group: infobox, provenance: extracted-fact, obligation: OPT, tiers: [secondary, principal]}
    sections:
      - {token: biography,     group: section, provenance: llm-prose,      obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: relationships, group: section, provenance: extracted-fact, obligation: OPT, tiers: [secondary, principal]}
      - {token: references,    group: section, provenance: extracted-fact, obligation: MIN, fallback: none, tiers: [figurant, secondary, principal]}
  EVENT:
    ner_labels: [EVENT]
    gliner_label: event
    export:
      subdir: events
      full_key: events
      infobox_template: Infobox event
      category_key: events
      category_default: Événements
      infobox_source: |-
        <includeonly>
        {| class="infobox"
        |-
        ! colspan="2" | {{{name}}}
        |-
        | '''Participants''' || {{{participants|}}}
        |-
        | '''Lieu''' || {{{lieu|}}}
        |-
        | '''Chapitre''' || {{{chapitre|}}}
        |-
        | '''Issue''' || {{{issue|}}}
        |}
        </includeonly>
    infobox:
      - {token: nom,  group: infobox, provenance: batch-bound, obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: type, group: infobox, provenance: batch-bound, obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: apparition, group: infobox, provenance: batch-bound, obligation: OPT, tiers: [figurant, secondary, principal]}
    sections:
      - {token: biography,     group: section, provenance: llm-prose,      obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: relationships, group: section, provenance: extracted-fact, obligation: OPT, tiers: [secondary, principal]}
      - {token: references,    group: section, provenance: extracted-fact, obligation: MIN, fallback: none, tiers: [figurant, secondary, principal]}
  # FACTION (STU-505): first-order now that the taxonomy carries it. The custom
  # fantasy-NER model emits FACTION; before STU-505 the extractor retagged it to
  # ORG because the frozen Literal downstream refused to carry it.
  FACTION:
    ner_labels: [FACTION]
    gliner_label: "people, race, or order"
    export:
      subdir: factions
      full_key: factions
      infobox_template: Infobox faction
      category_key: factions
      category_default: Factions
      infobox_source: |-
        <includeonly>
        {| class="infobox"
        |-
        ! colspan="2" | {{{name}}}
        |-
        | '''Type''' || {{{type|}}}
        |-
        | '''Chef(s)''' || {{{leaders|}}}
        |-
        | '''Membres notables''' || {{{members|}}}
        |-
        | '''Première mention''' || {{{first_seen|}}}
        |}
        </includeonly>
    infobox:
      - {token: nom,     group: infobox, provenance: batch-bound,    obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: type,    group: infobox, provenance: batch-bound,    obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: apparition, group: infobox, provenance: batch-bound, obligation: OPT, tiers: [figurant, secondary, principal]}
      - {token: leaders, group: infobox, provenance: extracted-fact, obligation: OPT, tiers: [secondary, principal]}
    sections:
      - {token: biography,     group: section, provenance: llm-prose,      obligation: MIN, tiers: [figurant, secondary, principal]}
      - {token: relationships, group: section, provenance: extracted-fact, obligation: OPT, tiers: [secondary, principal]}
      - {token: references,    group: section, provenance: extracted-fact, obligation: MIN, fallback: none, tiers: [figurant, secondary, principal]}
  # Templateless, declared for the vocabulary. OTHER is the untyped NER fallback
  # (exports into characters/, no infobox template); SYNOPSIS (STU-482) and
  # COLLATION (STU-511) are generation-only pseudo-types, body-only, no infobox,
  # so they carry no `ner_labels` and never enter resolution.
  OTHER:
    export:
      subdir: characters
    infobox: []
    sections: []
  SYNOPSIS:
    infobox: []
    sections: []
  COLLATION:
    infobox: []
    sections: []
# STU-477: the single authority for the relationship-classifier's type vocabulary.
# `description` is the application criterion injected into the classifier prompt —
# prompt scaffolding, so English regardless of the wiki's output language (STU-510).
# `labels` are reader-facing and localized; `legacy` maps the French surface strings
# earlier runs emitted onto the canonical token.
relationships:
  enum:
    family:
      legacy: [famille]
      labels: {en: Family, fr: Famille}
      description: >-
        Kinship by blood, marriage or adoption. Applies whenever the text establishes
        the kin tie, whether the bond is warm or hostile.
    mentor:
      legacy: ["mentor/protégé"]
      labels: {en: Mentor, fr: "Mentor/protégé"}
      description: >-
        One party trains, guides or instructs the other, and that teaching is the
        primary dynamic rather than an incidental scene.
    romance:
      legacy: [amoureux]
      labels: {en: Romance, fr: Amoureux}
      description: >-
        A romantic or sexual bond the text makes EXPLICIT — declared, reciprocated or
        consummated on the page. Mutual pull that is only felt and never acted on is
        budding_attraction, not romance.
    budding_attraction:
      labels: {en: Budding attraction, fr: "Attirance naissante"}
      description: >-
        Signs of mutual romantic interest not yet explicit or consummated: a noticed
        look, a caught breath, deflected flirtation, a reaction the character does not
        name. Use when the excerpts show the pull but neither party has declared or
        acted on it. Prefer over romance while the bond stays deniable, and over friend
        when the text marks a charge no friendship explains.
    strained_friendship:
      labels: {en: Strained friendship, fr: "Amitié tendue"}
      description: >-
        An established friendly bond carrying an unresolved tension — duty against
        loyalty, an unspoken attraction, a withheld truth. Use when the excerpts show
        BOTH the trust and the friction, so that friend alone would undersell the strain.
    friendly_rivalry:
      labels: {en: Friendly rivalry, fr: "Rivalité amicale"}
      description: >-
        The parties compete against each other without real hostility — sparring,
        contests, needling. Use when the competition is genuine but mutual regard
        survives it; enemy requires actual enmity.
    wary_alliance:
      labels: {en: Wary alliance, fr: "Alliance méfiante"}
      description: >-
        The parties cooperate toward a shared goal while withholding trust — a pact of
        convenience, a truce, collaboration under watch. Use when ally would overstate
        the trust and enemy would overstate the enmity.
    enemy:
      # STU-472: was `antagonist` — a narratological role, held toward THE protagonist.
      # Naming Chaol the antagonist of Cain implies Cain heads his own novel. Readers
      # say enemy; the classifier reached for the literary term as its catch-all.
      legacy: [antagoniste, antagonist]
      labels: {en: Enemy, fr: Ennemi}
      description: >-
        The parties work against each other with real enmity — opposed goals, harm done
        or intended. Competition without hostility is friendly_rivalry.
    ally:
      legacy: [allié]
      labels: {en: Ally, fr: Allié}
      description: >-
        The parties act toward a shared goal with established mutual trust. Cooperation
        that withholds trust is wary_alliance.
    employment:
      legacy: ["employeur/employé"]
      labels: {en: Employment, fr: "Employeur/employé"}
      description: >-
        A hierarchical employment or service bond — one party engages, commands or pays
        the other — and it is the PRIMARY dynamic. Never use it as a catch-all for
        allies, friends, family or romantic interests, which take their own type.
    friend:
      legacy: [ami]
      labels: {en: Friend, fr: Ami}
      description: >-
        A bond of mutual affection and trust with no unresolved tension and no romantic
        charge. When the excerpts mark either, use strained_friendship or
        budding_attraction instead.
    acquaintance:
      legacy: [connaissance]
      labels: {en: Acquaintance, fr: Connaissance}
      description: >-
        The parties know each other and interact directly, but the excerpts establish no
        stronger bond. Requires a direct interaction — mere co-occurrence stays null.
    other:
      legacy: [autre]
      labels: {en: Other, fr: Autre}
      description: >-
        A directly-attested relationship no other type fits. Last resort: exhaust every
        other type first, and prefer null over other when no bond is attested at all.
  # STU-476: how strongly the evidence sentence supports the type — graded by the
  # classifier, which is the only step that reads the excerpts. Keys are the tiers
  # wiki_creator/confidence.py declares (STU-428).
  confidence:
    explicit:
      description: >-
        The evidence sentence states or enacts the bond itself — it is named, declared
        or played out on the page (a kiss, "you are my friend", an order given and
        obeyed, a stated rank). A reader cannot read that sentence and doubt the type.
    inferred:
      description: >-
        The bond is never named, but the evidence shows conduct that this type explains
        and the others do not — repeated cooperation, a rescue, deference to a command.
        The reading is the likely one; the text still never says it.
    interpretation:
      description: >-
        The type rests on reading meaning into a gesture, a look, a silence, a
        proximity. Another reader could take the same sentence and type the pair
        differently. Grade here rather than round up — a smile is not a declaration.
labels:
  nom:           {en: Name,        fr: Nom}
  type:          {en: Type,        fr: Type}
  alias:         {en: Aliases,     fr: Alias}
  apparition:    {en: Appearance,  fr: Apparition}
  status:        {en: Status,      fr: Statut}
  species:       {en: Species,     fr: Espèce}
  affiliation:   {en: Affiliation, fr: Affiliation}
  titles:        {en: Titles,      fr: Titres}
  location:      {en: Location,    fr: Localisation}
  leaders:       {en: Leaders,     fr: Leaders}
  infobox:       {en: Infobox,     fr: Infobox}
  biography:     {en: Biography,   fr: Biographie}
  backstory:     {en: "Before the events of the book", fr: "Avant les événements du livre"}
  relationships: {en: Relationships, fr: Relations}
  personality:   {en: Personality, fr: Personnalité}
  physical:      {en: Appearance,  fr: "Description physique"}
  powers:        {en: Powers,      fr: Pouvoirs}
  trivia:        {en: Trivia,      fr: Anecdotes}
  narrative_role: {en: "Narrative role", fr: "Rôle dans le récit"}
  events:        {en: Events,      fr: Événements}
  references:    {en: References,  fr: Références}
  # STU-514: event-page section heading (Déroulement), localized like every
  # other output-anchoring section title.
  course:        {en: "Course of events", fr: "Déroulement"}
# STU-510: language display names for the (English) prompt scaffolding, and the
# per-tier prose length guide — previously hardcoded in generate_wiki_pages.py.
language_names:
  fr: French
  en: English
# STU-510: reader-facing export chrome (spoiler collapsible controls, relationship
# index label). Localized like the rest of the output, never hardcoded in Python.
chrome:
  reveal:    {fr: "Chapitre {chapter} — révéler", en: "Chapter {chapter} — reveal"}
  collapse:  {fr: "Masquer", en: "Hide"}
  evolution: {fr: "Évolution :", en: "Evolution:"}
  # STU-514: Main_Page navigation, showcase headings, and statistics. Reader-facing
  # chrome — localized by output_language, was hardcoded French in export_helpers.py.
  main_characters:    {fr: "Personnages principaux", en: "Main characters"}
  main_locations:     {fr: "Lieux importants", en: "Important locations"}
  navigation:         {fr: "Navigation", en: "Navigation"}
  statistics:         {fr: "Statistiques", en: "Statistics"}
  synopsis:           {fr: "Synopsis", en: "Synopsis"}
  synopsis_link:      {fr: "Synopsis du livre", en: "Book synopsis"}
  all_characters:     {fr: "Tous les personnages", en: "All characters"}
  all_locations:      {fr: "Tous les lieux", en: "All locations"}
  all_organizations:  {fr: "Toutes les organisations", en: "All organizations"}
  stat_pages:         {fr: "pages wiki", en: "wiki pages"}
  stat_characters:    {fr: "personnages", en: "characters"}
  stat_locations:     {fr: "lieux", en: "locations"}
  stat_organizations: {fr: "organisations", en: "organizations"}
  # STU-514: collective-page (collation) chrome — titles and per-entry lines.
  minor_persons:       {fr: "Personnages mineurs", en: "Minor characters"}
  minor_locations:     {fr: "Lieux mineurs", en: "Minor locations"}
  minor_organizations: {fr: "Organisations mineures", en: "Minor organizations"}
  minor_other:         {fr: "Autres entités mineures", en: "Other minor entities"}
  collation_aliases:   {fr: "Alias : {aliases}", en: "Aliases: {aliases}"}
  collation_mentions:  {fr: "Mentionné {mentions} fois dans {chapters} chapitre(s).", en: "Mentioned {mentions} times in {chapters} chapter(s)."}
  # STU-514: event-page title disambiguation suffix (chapter tag on colliding titles).
  chapter_tag:         {fr: "chapitre {chapter}", en: "chapter {chapter}"}
# STU-516: reader-facing stub-page bodies, rendered as-is in the wiki when an
# entity's page cannot be generated. Localized like the rest of the output.
stubs:
  failed:       {fr: "Échec technique de la génération pour cette entité.", en: "Technical failure while generating this entity."}
  insufficient: {fr: "Informations insuffisantes disponibles pour cette entité.", en: "Insufficient information available for this entity."}
  # STU-514: event-page stubs (dry-run / generation failure), rendered under the
  # localized "course" heading.
  event_failed:  {fr: "Échec technique de la génération.", en: "Technical failure while generating this page."}
  event_dry_run: {fr: "Page d'événement non générée (dry-run).", en: "Event page not generated (dry run)."}
# STU-517: wiki-page-validator error messages, localized. Each error also carries
# a stable neutral `code` (see scripts/wiki_page_validator.py) that generate_wiki_pages
# matches on for identity-only recovery — the prose here is free to be reworded.
validator:
  errors:
    language_contamination:    {fr: "Contenu en anglais détecté (marqueurs : {markers})", en: "English content detected (markers: {markers})"}
    epub_id:                   {fr: "ID EPUB dans le contenu (ex: C07.xhtml)", en: "EPUB ID in the content (e.g. C07.xhtml)"}
    infobox_key_prefix:        {fr: "Clé infobox préfixée par '- ' : {key}", en: "Infobox key prefixed with '- ': {key}"}
    series_anchor_missing:     {fr: "Le titre de série '{series}' est absent du premier paragraphe", en: "The series title '{series}' is missing from the first paragraph"}
    forbidden_series:          {fr: "Hallucination cross-série détectée : {hit}", en: "Cross-series hallucination detected: {hit}"}
    forbidden_name:            {fr: "Spoiler détecté (nom interdit) : {name}", en: "Spoiler detected (forbidden name): {name}"}
    identity_title_mismatch:   {fr: "Titre de page '{page_title}' ≠ entité demandée '{expected}'", en: "Page title '{page_title}' ≠ requested entity '{expected}'"}
    identity_infobox_mismatch: {fr: "Infobox '{key}: {value}' ne correspond pas à l'entité '{expected}'", en: "Infobox '{key}: {value}' does not match entity '{expected}'"}
    ungrounded_name:           {fr: "Nom non ancré dans les extraits source : {name}", en: "Name not grounded in the source excerpts: {name}"}
    ungrounded_claim:          {fr: "Affirmation non ancrée dans les extraits source : {claim}", en: "Statement not grounded in the source excerpts: {claim}"}
    unauthorized_reference_title: {fr: "Titre non autorisé dans Références : '{title}'", en: "Unauthorized title in References: '{title}'"}
length_by_tier:
  principal: "4 to 6 paragraphs total across all sections."
  secondary: "1 to 2 paragraphs for the main section. Keep all other sections brief."
  figurant: "1 short paragraph only. Use only the most relevant section."
# STU-510: per-section writing briefs, keyed by entity_type then section token,
# localized. Extracted from the SECTION_DEFINITIONS f-strings. OTHER falls back
# to PERSON (as the old SECTION_DEFINITIONS.get(etype, ...["PERSON"]) did).
briefs:
  PERSON:
    infobox:        {fr: "Champs factuels clés : nom, alias, rôle, affiliation, statut. Omets les champs inconnus.", en: "Key factual fields: name, aliases, role, affiliation, status. Omit unknown fields."}
    biography:      {fr: "Qui est ce personnage et quel est son rôle dans le monde. Les événements servent de contexte, pas de liste chronologique.", en: "Who this character is and their role in the world. Events serve as context, not a chronological list."}
    backstory:      {fr: "Le passé du personnage révélé en flashback, avant le récit présent du livre. Prose ancrée uniquement sur le contexte de backstory. Ne pas répéter la biographie présente.", en: "The character's past revealed in flashback, before the book's present-day narrative. Prose grounded only in the backstory context. Do not repeat the present-day biography."}
    narrative_role: {fr: "Arc chronologique du personnage à travers l'intrigue, en prose, ancré uniquement sur les événements listés.", en: "The character's chronological arc through the plot, in prose, grounded only in the listed events."}
    personality:    {fr: "Traits observés avec ancrage textuel. Évite les adjectifs génériques sans preuve. Montre les contradictions ou tensions internes si elles existent.", en: "Observed traits with textual grounding. Avoid generic adjectives without evidence. Show internal contradictions or tensions where they exist."}
    physical:       {fr: "Détails physiques confirmés par le texte uniquement. Concis.", en: "Physical details confirmed by the text only. Concise."}
    powers:         {fr: "Capacités ou compétences distinctives. Si aucun pouvoir magique, décris les compétences pratiques.", en: "Distinctive abilities or skills. If no magical power, describe practical skills."}
    relationships:  {fr: "Une entrée en gras par relation significative, suivie d'une description de la nature du lien. Format: **Nom** — description.", en: "One bold entry per significant relationship, followed by a description of the nature of the bond. Format: **Name** — description."}
    trivia:         {fr: "Faits spécifiques et concrets qui ne rentrent pas dans les autres sections. Pas de re-résumé de la biographie.", en: "Specific, concrete facts that do not fit the other sections. No re-summary of the biography."}
