  # Templateless, but declared: all three reach real output, and this file is
  # the authority for the vocabulary. Real templates belong to STU-505.
  #   OTHER     — ENTITY_TYPE fallback (types.py); exports into characters/
  #   SYNOPSIS  — book synopsis page (STU-482); body-only, no infobox
  #   COLLATION — collective page for a collated tier (STU-511); body-only,
  #               built deterministically by wiki_preparation, never by an LLM
  OTHER:
    infobox: []
    sections: []
  SYNOPSIS:
    infobox: []
    sections: []
  COLLATION:
    infobox: []
    sections: []
