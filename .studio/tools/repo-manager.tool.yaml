name: repo_manager
description: Read and write files in the workspace
version: 1

commands:
  - name: repo_manager-read_file
    description: Read a file from the workspace
    parameters:
      path:
        type: string
        required: true
        description: File path relative to the workspace root
    execute:
      type: builtin
      parse_output: json

  - name: repo_manager-write_file
    description: Write or create a file in the workspace
    parameters:
      path:
        type: string
        required: true
        description: File path relative to the workspace root
      content:
        type: string
        required: true
        description: Full content to write to the file
    execute:
      type: builtin
      parse_output: json

  - name: repo_manager-list_files
    description: List files in the workspace
    parameters:
      path:
        type: string
        required: false
        description: Directory to list (default is workspace root)
      recursive:
        type: boolean
        required: false
        description: Whether to list recursively
    execute:
      type: builtin
      parse_output: json

  - name: repo_manager-apply_patch
    description: Apply a unified diff patch to a file
    parameters:
      path:
        type: string
        required: true
        description: File path to patch
      patch:
        type: string
        required: true
        description: Unified diff patch content
    execute:
      type: builtin
      parse_output: json

prompt_snippet: |
  You have access to file management tools. Read files before modifying them.
  Use repo_manager-write_file to create or update files — provide the full file content.
