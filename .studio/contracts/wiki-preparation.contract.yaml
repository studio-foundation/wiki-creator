name: wiki-preparation
version: 1
schema:
  required_fields:
    - batches
    - total_entities
    - narrator
# batches: [{batch_id, file, entity_count}] — paths to wiki_inputs/batch_*.json files
# total_entities: number of entities to process (non-ignored)
# narrator: narrator metadata from entity-resolution-PERSON, or null
# The batches array-of-objects shape is machine-checked by the validator below.
# PYTHONPATH pins the check to the tree being run, not to whichever checkout
# `pip install -e` points at.
validators:
  - name: preparation-batches-shape
    command: PYTHONPATH=. python3 scripts/validate_preparation_batches.py
expected_outputs:
  files:
    # wiki-preparation (wiki_preparation.py) writes the batch files it lists in
    # `batches` into wiki_inputs/<slug>/. Asserting the files (not just the dir the
    # old check verified) is the stronger, culprit-pointing form: the stage's job
    # is to emit batches. Moved from run_wiki.py required_files() (STU-600).
    - "library/*/*/wiki_inputs/*/batch_*.json"
    # relationships_classified.json is a required INPUT of this stage, written by
    # the wiki-preparation pre-step (scripts/classify_relationships.py). No stage
    # here writes it; asserting it on its sole consumer keeps run_wiki.py's old
    # required_files() coverage after the pre-step is removed. Glob: per-book slug.
    - "library/*/*/processing_output/*/relationships_classified.json"
