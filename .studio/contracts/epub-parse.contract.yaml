name: epub-parse
version: 1
schema:
  required_fields:
    - title
    - chapters
    - pov_detection
    - language
# author intentionally omitted — nullable in some EPUBs
# language: resolved book language, stamped on the payload (parse_epub.py) — every
#   downstream stage keys cue-words/models off it (STU-453), so it is not optional
# Semantic guard: chapters not empty — checked in script (parse_epub.py)
expected_outputs:
  files:
    # epub-parse (parse_epub.py) writes epub_data.json into the book's
    # processing_output/<slug>/. Glob because the slug is per-book and the check
    # runs with cwd = repo root. Moved here from run_wiki.py required_files() (STU-600).
    - "library/*/*/processing_output/*/epub_data.json"
