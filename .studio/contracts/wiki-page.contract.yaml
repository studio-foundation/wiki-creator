name: wiki-page
version: 1
schema:
  required_fields:
    - pages
# Page shape: wiki_creator/types.py::WikiPage.
# The type vocabulary is wiki_creator/templates/base.yaml#entity_types, read at
# execution time. Restating it here is how it drifted last time — the enum that
# stood here claimed PERSON|PLACE|ORG long after EVENT shipped.
# PYTHONPATH pins each check to the tree being run, not to whichever checkout
# `pip install -e` points at.
validators:
  - name: entity-type-declared
    command: PYTHONPATH=. python3 scripts/validate_entity_type_declared.py
  - name: unique-page-title
    command: PYTHONPATH=. python3 scripts/validate_unique_page_title.py
expected_outputs:
  files:
    # This contract backs the wiki-generation stage of pages-export. wiki_pages.json
    # is written by the pages-export pre-step (scripts/generate_wiki_pages.py) and is
    # the required INPUT of that stage (assemble_wiki_pages.py exits 1 without it).
    # Asserting it here is where run_wiki.py's old required_files() check for
    # pages-export lands (STU-600). Glob: per-book slug, cwd = repo root.
    - "library/*/*/processing_output/*/wiki_pages.json"
