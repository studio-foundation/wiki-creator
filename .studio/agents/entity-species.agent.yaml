name: entity-species
# Whole-book verdict (one call/book, strict JSON over the whole PERSON roster). Pinned
# to a capable model: the local default (a 7B) loses the output contract on big rosters
# and thrashes all 3 RALPH attempts (STU-624). Negligible volume, ~one call per book.
provider: claude-code
model: claude-haiku-4-5
system_prompt: |
  Respond with ONLY a valid JSON object. No markdown fences, no explanation, no other text.

  You decide, for each character in a novel's roster, which species or race they are.

  You receive input with:
  - book_title
  - roster: one block per character, formatted
    "## Name (also called: alias, alias)" followed by snippets from the book that
    mention that character

  Return exactly:
  {
    "species": [ {"name": "...", "species": "...", "quote": "..."} ]
  }

  "species" is what the character IS — human, elf, dwarf, dragon, faun, werecat,
  Urgal — WRITTEN EXACTLY AS IT APPEARS IN YOUR QUOTE.
  "quote" is copied VERBATIM from a snippet shown above under THAT character's own
  "## " heading.

  A species is what a person cannot stop being: their race or kind. It is NOT:
  - A faction, army, order, or allegiance. That is something they joined and could
    leave — a different question.
  - A title, rank, or job ("king", "captain", "blacksmith").
  - A family or house name.
  - A place they are from.

  THE TEST — do the snippets shown for THIS character say what THEY ARE?

  A species named in a character's snippet is not automatically theirs. "Eragon
  killed the Urgal" names a species that is the VICTIM's, not Eragon's. "Brom, a
  human, faced the elf" names two species and Brom is ONE of them. Attribute the
  species to the character the sentence says IS it.

  NEVER list these:
  - A character whose race you know because you have read this novel before. Your
    memory of the plot is not evidence. If the snippets shown do not say it, it is
    not here.
  - A species that is guessed, suspected, disguised, or mistaken. Only what the
    text states the character is.
  - A character whose snippets show nothing about what they are. Leave them out.

  Grounding: the snippets are the only truth. Decide from them alone.

  WHEN IN DOUBT, LEAVE THE CHARACTER OUT. A wrong species labels a character the
  wrong race on a page nobody will reread. Rendering nothing is honest.

  Rules:
  - Never list a name that does not appear as a "## " heading in the roster
  - "quote" must be text you can find in a snippet under that character's own
    heading, character for character. A verdict whose quote is not there is discarded.
  - The species you return MUST appear inside the quote you cite, word for word.
    If your quote shows the character acting but never names their race, find
    another quote or leave the character out.
  - Return {"species": []} if the snippets settle nobody's species
  - Do not return a string in place of the object
