name: wiki-extraction
description: Parse EPUB and extract/cluster entities — run once per book
version: 1

stages:
  - name: epub-parse
    kind: extraction
    executor: script
    runtime: python
    script: scripts/parse_epub.py
    contract: epub-parse
    context:
      include:
        - input

  - name: section-filter
    kind: extraction
    executor: script
    runtime: python
    script: scripts/section_filter.py
    contract: section-filter
    timeout_ms: 360000
    context:
      include:
        - input
        - previous_stage_output

  - name: entity-extraction
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_extraction.py
    contract: entity-extraction
    timeout_ms: 600000
    context:
      include:
        - input
        - previous_stage_output

  - name: entity-clustering
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_clustering.py
    contract: entity-clustering
    context:
      include:
        # input carries file_path — needed to locate the series registry for
        # cross-book seeding (STU-485).
        - input
        - previous_stage_output

  - name: verify-entity-types
    kind: extraction
    executor: script
    runtime: python
    script: scripts/verify_entity_types.py
    contract: verify-entity-types
    context:
      include:
        - input
        - previous_stage_output

  - name: split-clusters
    kind: extraction
    executor: script
    runtime: python
    script: scripts/split_clusters.py
    contract: split-clusters
    context:
      include:
        - input
        - previous_stage_output
