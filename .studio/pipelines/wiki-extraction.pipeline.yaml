name: wiki-extraction
description: Parse EPUB and extract/cluster entities — run once per book
version: 1

stages:
  - name: epub-parse
    kind: extraction
    executor: script
    runtime: python
    script: scripts/parse_epub.py
    contract: epub-parse
    context:
      include:
        - input

  # section-filter split (STU-589): pre builds the classifier input and decides
  # cache hit/miss; the call invokes the LLM natively (no subprocess); post
  # parses, caches and applies the verdict. on_failure: continue preserves the
  # STU-529 bias — a failed verdict keeps every section and the run proceeds.
  - name: section-filter-pre
    kind: extraction
    executor: script
    runtime: python
    script: scripts/section_filter_pre.py
    context:
      include:
        - input
        - previous_stage_output

  - call: section-filter-verdict
    pipeline: section-filter-item
    condition: stages.section-filter-pre.output.needs_verdict == true
    on_failure: continue
    input:
      book_title: "{{stages.section-filter-pre.output.book_title}}"
      sections: "{{stages.section-filter-pre.output.sections}}"

  - name: section-filter
    kind: extraction
    executor: script
    runtime: python
    script: scripts/section_filter.py
    contract: section-filter
    context:
      include:
        - input
        - all_stage_outputs

  - name: entity-extraction
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_extraction.py
    contract: entity-extraction
    timeout_ms: 600000
    context:
      include:
        - input
        - previous_stage_output

  - name: entity-clustering
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_clustering.py
    contract: entity-clustering
    context:
      include:
        # input carries file_path — needed to locate the series registry for
        # cross-book seeding (STU-485).
        - input
        - previous_stage_output

  - name: split-clusters
    kind: extraction
    executor: script
    runtime: python
    script: scripts/split_clusters.py
    contract: split-clusters
    context:
      include:
        - input
        - previous_stage_output
