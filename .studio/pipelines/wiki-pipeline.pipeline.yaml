name: wiki-pipeline
description: Generate structured wiki pages from an EPUB book
version: 1

stages:
  - name: epub-parse
    kind: extraction
    executor: script
    command: python scripts/parse_epub.py
    context:
      include:
        - input

  - name: entity-extraction
    kind: extraction
    executor: script
    command: python scripts/entity_extraction.py
    context:
      include:
        - input
        - previous_stage_output

  - name: entity-resolution
    kind: analysis
    agent: resolver
    contract: entity-resolution
    ralph:
      max_attempts: 3
    context:
      include:
        - input
        - previous_stage_output

  - name: wiki-generation
    kind: analysis
    agent: writer
    contract: wiki-generation
    ralph:
      max_attempts: 3
    context:
      include:
        - input
        - previous_stage_output
