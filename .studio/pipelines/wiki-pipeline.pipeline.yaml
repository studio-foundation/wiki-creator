name: wiki-pipeline
description: Generate structured wiki pages from an EPUB book
version: 1

stages:
  - name: epub-parse
    kind: extraction
    executor: script
    runtime: python
    script: scripts/parse_epub.py
    contract: epub-parse
    context:
      include:
        - input

  - name: entity-extraction
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_extraction.py
    contract: entity-extraction
    timeout_ms: 600000
    context:
      include:
        - input
        - previous_stage_output

  - name: entity-clustering
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_clustering.py
    contract: entity-clustering
    context:
      include:
        - previous_stage_output

  - name: split-clusters
    kind: extraction
    executor: script
    runtime: python
    script: scripts/split_clusters.py
    contract: split-clusters
    context:
      include:
        - previous_stage_output

  - group: entity-resolution
    mode: parallel
    max_iterations: 1
    on_failure: collect-all
    stages:
      - name: entity-resolution-PERSON
        kind: analysis
        agent: resolver
        contract: entity-resolution
        ralph:
          max_attempts: 3
        context:
          include:
            - previous_stage_output
            - stage_name

      - name: entity-resolution-PLACE
        kind: analysis
        agent: resolver
        contract: entity-resolution
        ralph:
          max_attempts: 3
        context:
          include:
            - previous_stage_output
            - stage_name

      - name: entity-resolution-ORG
        kind: analysis
        agent: resolver
        contract: entity-resolution
        ralph:
          max_attempts: 3
        context:
          include:
            - previous_stage_output
            - stage_name

      - name: entity-resolution-EVENT
        kind: analysis
        agent: resolver
        contract: entity-resolution
        condition: "stages.split-clusters.output.stats.multi_EVENT > 0"
        ralph:
          max_attempts: 2
        context:
          include:
            - previous_stage_output
            - stage_name

      - name: entity-resolution-OTHER
        kind: analysis
        agent: resolver
        contract: entity-resolution
        condition: "stages.split-clusters.output.stats.multi_OTHER > 0"
        ralph:
          max_attempts: 2
        context:
          include:
            - previous_stage_output
            - stage_name

  - name: merge-entities
    kind: extraction
    executor: script
    runtime: python
    script: scripts/merge_entities.py
    contract: merge-entities
    context:
      include:
        - all_stage_outputs

  - name: relationship-extraction
    kind: analysis
    executor: script
    runtime: python
    script: scripts/relationship_extraction.py
    contract: relationship-extraction
    context:
      include:
        - input
        - previous_stage_output

  - name: entity-classification
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_classification.py
    contract: entity-classification
    context:
      include:
        - input
        - previous_stage_output

  - name: wiki-preparation
    kind: extraction
    executor: script
    runtime: python
    script: scripts/wiki_preparation.py
    contract: wiki-preparation
    context:
      include:
        - input
        - previous_stage_output

  - name: wiki-generation
    kind: analysis
    agent: writer
    contract: wiki-generation
    ralph:
      max_attempts: 3
    hooks:
      on_stage_complete:
        - command: "echo '{\"pages\": {{output.pages | tojson}}}' | python scripts/copyright_check.py --epub {{input.file_path}}"
          on_failure: reject
    context:
      include:
        - input
        - previous_stage_output

  - name: wiki-export
    kind: extraction
    executor: script
    runtime: python
    script: scripts/wiki_export.py
    contract: wiki-export
    context:
      include:
        - input
        - epub-parse
        - previous_stage_output
