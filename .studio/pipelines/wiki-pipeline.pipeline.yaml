name: wiki-pipeline
description: Generate structured wiki pages from an EPUB book
version: 1

stages:
  - name: epub-parse
    kind: extraction
    executor: script
    runtime: python
    script: scripts/parse_epub.py
    context:
      include:
        - input

  - name: entity-extraction
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_extraction.py
    timeout_ms: 600000
    context:
      include:
        - input
        - previous_stage_output

  - name: entity-clustering
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_clustering.py
    contract: entity-clustering
    context:
      include:
        - previous_stage_output

  - name: entity-resolution
    kind: analysis
    agent: resolver
    contract: entity-resolution
    ralph:
      max_attempts: 3
    context:
      include:
        - input
        - epub-parse
        - previous_stage_output

  - name: relationship-extraction
    kind: analysis
    executor: script
    runtime: python
    script: scripts/relationship_extraction.py
    contract: relationship-extraction
    context:
      include:
        - input
        - previous_stage_output

  - name: entity-classification
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_classification.py
    contract: entity-classification
    context:
      include:
        - input
        - previous_stage_output

  - name: wiki-generation
    kind: analysis
    agent: writer
    contract: wiki-generation
    ralph:
      max_attempts: 3
    hooks:
      on_stage_complete:
        - command: "echo '{\"pages\": {{output.pages | tojson}}}' | python scripts/copyright_check.py --epub {{input.file_path}}"
          on_failure: reject
    context:
      include:
        - input
        - previous_stage_output

  - name: wiki-export
    kind: extraction
    executor: script
    runtime: python
    script: scripts/wiki_export.py
    context:
      include:
        - input
        - epub-parse
        - previous_stage_output
