name: pages-export
description: Generate wiki pages, synopsis and event pages, consolidate stance, then assemble, check copyright and export to wikitext
version: 1

# STU-457: the four run_wiki.py pages-export pre-steps are stages here now.
# generate-wiki-pages fans out via one nested `studio run wiki-pages` (the
# STU-612 plan / map fan-out / replay, per-page resume); synopsis and event
# pages call wiki-page-item per page (STU-589 left them on the item runner).
stages:
  - name: generate-wiki-pages
    kind: analysis
    executor: script
    runtime: python
    script: scripts/generate_wiki_pages.py
    timeout_ms: 21600000
    context:
      include:
        - input

  # synopsis / event pages split (STU-621): pre builds the wiki-pages map items,
  # the native `call: wiki-pages` runs them through the wiki-page-item pipeline
  # (its generation-validation group re-rolls spoilers natively, so no host-level
  # retry pass), and post finalizes. on_failure: continue keeps the run alive —
  # a failed page stubs, never fails the run (these stages never fail the run).
  - name: generate-book-synopsis-pre
    kind: analysis
    executor: script
    runtime: python
    script: scripts/generate_book_synopsis_pre.py
    timeout_ms: 300000
    context:
      include:
        - input

  - call: book-synopsis-verdict
    pipeline: wiki-pages
    condition: stages.generate-book-synopsis-pre.output.needs_verdict == true
    on_failure: continue
    input:
      items: "{{stages.generate-book-synopsis-pre.output.items}}"
      prompt_fingerprint: "{{stages.generate-book-synopsis-pre.output.prompt_fingerprint}}"

  - name: generate-book-synopsis
    kind: analysis
    executor: script
    runtime: python
    script: scripts/generate_book_synopsis.py
    timeout_ms: 1800000
    context:
      include:
        - input
        - all_stage_outputs

  - name: generate-event-pages-pre
    kind: analysis
    executor: script
    runtime: python
    script: scripts/generate_event_pages_pre.py
    timeout_ms: 300000
    context:
      include:
        - input

  - call: event-pages-verdict
    pipeline: wiki-pages
    condition: stages.generate-event-pages-pre.output.needs_verdict == true
    on_failure: continue
    input:
      items: "{{stages.generate-event-pages-pre.output.items}}"
      prompt_fingerprint: "{{stages.generate-event-pages-pre.output.prompt_fingerprint}}"

  - name: generate-event-pages
    kind: analysis
    executor: script
    runtime: python
    script: scripts/generate_event_pages.py
    timeout_ms: 7200000
    context:
      include:
        - input
        - all_stage_outputs

  - name: consolidate-editorial-stance
    kind: extraction
    executor: script
    runtime: python
    script: scripts/consolidate_editorial_stance.py
    timeout_ms: 300000
    context:
      include:
        - input

  - name: wiki-generation
    kind: extraction
    executor: script
    runtime: python
    script: scripts/assemble_wiki_pages.py
    contract: wiki-page
    context:
      include:
        - input

  - name: copyright-check
    kind: extraction
    executor: script
    runtime: python
    script: scripts/copyright_check.py
    contract: copyright-check
    context:
      include:
        - input
        - previous_stage_output

  - name: wiki-export
    kind: extraction
    executor: script
    runtime: python
    script: scripts/wiki_export.py
    contract: wiki-export
    context:
      include:
        - input
        - previous_stage_output
