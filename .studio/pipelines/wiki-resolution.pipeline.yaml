name: wiki-resolution
description: Resolve entities and extract relationships — run once per book
version: 1

stages:
  - name: split-clusters
    kind: extraction
    executor: script
    runtime: python
    script: scripts/load_splits.py
    contract: split-clusters
    context:
      include:
        - input

  - name: resolve-clusters
    kind: extraction
    executor: script
    runtime: python
    script: scripts/resolve_clusters.py
    contract: resolve-clusters
    context:
      include:
        - previous_stage_output

  - name: alias-resolution
    kind: extraction
    executor: script
    runtime: python
    script: scripts/alias_resolution.py
    contract: alias-resolution
    context:
      include:
        - input
        - previous_stage_output

  - name: merge-entities
    kind: extraction
    executor: script
    runtime: python
    script: scripts/merge_entities.py
    contract: merge-entities
    context:
      include:
        - all_stage_outputs

  - name: relationship-extraction
    kind: analysis
    executor: script
    runtime: python
    script: scripts/relationship_extraction.py
    contract: relationship-extraction
    timeout_ms: 600000
    context:
      include:
        - input
        - previous_stage_output

  - name: entity-classification
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_classification.py
    contract: entity-classification
    context:
      include:
        - input
        - previous_stage_output
