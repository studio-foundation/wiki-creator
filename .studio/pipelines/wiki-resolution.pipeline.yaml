name: wiki-resolution
description: Resolve entities and extract relationships — run once per book
version: 1

stages:
  - name: resolve-clusters
    kind: extraction
    executor: script
    runtime: python
    script: scripts/resolve_clusters.py
    contract: resolve-clusters
    context:
      include:
        - input

  - name: relationship-extraction
    kind: analysis
    executor: script
    runtime: python
    script: scripts/relationship_extraction.py
    contract: relationship-extraction
    timeout_ms: 1800000
    context:
      include:
        - input
        - all_stage_outputs

  - name: alias-resolution
    kind: extraction
    executor: script
    runtime: python
    script: scripts/alias_resolution.py
    contract: alias-resolution
    # Alias detection is pairwise over the tome's entities, so its cost grows
    # with the square of the entity count. The 30s default fits the fixture
    # novella and dies on any real book (Eldest, 195 entities, needs >30s).
    timeout_ms: 1800000
    context:
      include:
        - input
        - all_stage_outputs

  # alias-adjudication split (STU-589): pre builds the roster and decides cache
  # hit/miss; the call invokes the LLM natively (no subprocess); post parses,
  # caches and applies the merges. on_failure: continue preserves the STU-538
  # bias — a failed verdict merges nothing and the run proceeds.
  - name: alias-adjudication-pre
    kind: extraction
    executor: script
    runtime: python
    script: scripts/alias_adjudication_pre.py
    context:
      include:
        - input
        - all_stage_outputs

  - call: alias-adjudication-verdict
    pipeline: alias-adjudication-item
    condition: stages.alias-adjudication-pre.output.needs_verdict == true
    on_failure: continue
    input:
      book_title: "{{stages.alias-adjudication-pre.output.book_title}}"
      roster: "{{stages.alias-adjudication-pre.output.roster}}"

  - name: alias-adjudication
    kind: extraction
    executor: script
    runtime: python
    script: scripts/alias_adjudication.py
    contract: alias-adjudication
    context:
      include:
        - input
        - all_stage_outputs

  - name: entity-classification
    kind: extraction
    executor: script
    runtime: python
    script: scripts/entity_classification.py
    contract: entity-classification
    context:
      include:
        - input
        - all_stage_outputs

  - name: write-registry
    kind: extraction
    executor: script
    runtime: python
    script: scripts/write_registry.py
    contract: write-registry
    context:
      include:
        - input
        - all_stage_outputs
