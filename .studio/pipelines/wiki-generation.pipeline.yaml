name: wiki-generation
description: Generate wiki pages from classified entities — re-runnable per batch
version: 1

stages:
  - name: epub-parse
    kind: extraction
    executor: script
    runtime: python
    script: scripts/load_epub_data.py
    contract: epub-parse
    context:
      include:
        - input

  - name: entity-classification
    kind: extraction
    executor: script
    runtime: python
    script: scripts/load_classified_entities.py
    contract: entity-classification
    context:
      include:
        - input

  - name: chapter-summary
    kind: extraction
    timeout_ms: 86400000
    executor: script
    runtime: python
    script: scripts/chapter_summary.py
    contract: chapter-summary
    context:
      include:
        - input
        - previous_stage_output
        - all_stage_outputs

  - name: wiki-preparation
    kind: extraction
    executor: script
    runtime: python
    script: scripts/wiki_preparation.py
    contract: wiki-preparation
    context:
      include:
        - input
        - previous_stage_output
        - all_stage_outputs

  - name: wiki-generation
    kind: extraction
    executor: script
    runtime: python
    script: scripts/load_wiki_pages.py
    contract: wiki-page
    context:
      include:
        - input

  - name: copyright-check
    kind: extraction
    executor: script
    runtime: python
    script: scripts/copyright_check.py
    contract: copyright-check
    context:
      include:
        - input
        - previous_stage_output

  - name: wiki-export
    kind: extraction
    executor: script
    runtime: python
    script: scripts/wiki_export.py
    contract: wiki-export
    context:
      include:
        - input
        - previous_stage_output
