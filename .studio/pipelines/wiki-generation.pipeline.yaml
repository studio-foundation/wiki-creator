name: wiki-generation
description: Generate wiki pages from classified entities — re-runnable per batch
version: 1

stages:
  - name: epub-parse
    kind: extraction
    executor: script
    runtime: python
    script: scripts/load_epub_data.py
    contract: epub-parse
    context:
      include:
        - input

  - name: entity-classification
    kind: extraction
    executor: script
    runtime: python
    script: scripts/load_classified_entities.py
    contract: entity-classification
    context:
      include:
        - input

  - name: wiki-preparation
    kind: extraction
    executor: script
    runtime: python
    script: scripts/wiki_preparation.py
    contract: wiki-preparation
    context:
      include:
        - input
        - previous_stage_output

  - name: wiki-generation
    kind: analysis
    agent: writer-lite
    contract: wiki-page
    ralph:
      max_attempts: 3
    context:
      include:
        - input
        - previous_stage_output

  - name: copyright-check
    kind: extraction
    executor: script
    runtime: python
    script: scripts/copyright_check.py
    contract: copyright-check
    context:
      include:
        - input
        - previous_stage_output

  - name: wiki-export
    kind: extraction
    executor: script
    runtime: python
    script: scripts/wiki_export.py
    contract: wiki-export
    context:
      include:
        - input
        - epub-parse
        - previous_stage_output
