# Canon policy for the Throne of Glass series (STU-512).
#
# One EPUB per tome, sovereign de facto — nothing to arbitrate today. This file
# writes that rule down before a second source of truth on the same content
# (scripts/scrape_fandom.py, currently LoRA-dataset only) is ever wired into
# wiki generation.
#
# Consumed by scripts/parse_epub.py (resolves which source is read) and
# scripts/write_registry.py (arbitrates cross-tome Registry.accumulate).
canon:
  primary_source: epub
  sources:
    - id: epub_en_tog_01
      type: epub
      path: books/01-throne-of-glass.epub
      authority: 100
  conflict_resolution:
    strategy: highest_authority  # highest_authority | primary_wins | flag_for_review
    on_unresolved: flag          # flag (warn, fall back to primary) | fail (raise)
  cross_tome:
    later_tome_overrides: false
