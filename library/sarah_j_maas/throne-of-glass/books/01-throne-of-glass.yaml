description: |
  Build a wiki for "Throne of Glass" by Sarah J. Maas,
  book 1 of the Throne of Glass series.
  Parse the book, extract all named entities (characters, locations, organizations, events),
  resolve aliases, and generate Markdown wiki pages for each entity.

file_path: library/sarah_j_maas/throne-of-glass/books/01-throne-of-glass.epub
# spacy_model now only tokenizes, tags and splits sentences; GLiNER finds the
# entities (STU-521). The tagger matters: wiki-ner-en had none, so this book's
# POS span filters had never once run.
spacy_model: en_core_web_lg
language: en
ner:
  # Celaena, Chaol, Nehemia, Erilea: names spaCy has never read, so it types them
  # ORG. A prompt-typed model finds the entities instead (STU-521, STU-537).
  invented_names: true
coref: true
use_llm: true
llm_model: mistral:7b-instruct
novel_summary: |
  After serving out a year of hard labor in the salt mines of Endovier for her crimes, 18-year-old assassin Celaena Sardothien is dragged before the Crown Prince.
  Prince Dorian offers her her freedom on one condition: she must act as his champion in a competition to find a new royal assassin. Her opponents are men-thieves
  and assassins and warriors from across the empire, each sponsored by a member of the king's council. If she beats her opponents in a series of eliminations, 
  she'll serve the kingdom for three years and then be granted her freedom. Celaena finds her training sessions with the captain of the guard, Westfall, 
  challenging and exhilirating. But she's bored stiff by court life. Things get a little more interesting when the prince starts to show interest in her… 
  but it's the gruff Captain Westfall who seems to understand her best. Then one of the other contestants turns up dead… quickly followed by another. Can 
  Celaena figure out who the killer is before she becomes a victim? As the young assassin investigates, her search leads her to discover a greater destiny than 
  she could possibly have imagined.
workers: 8

# Absolute pre-filter applied before clustering/classification:
# entities with total mentions below this value are dropped early.
min_mentions_absolute: 3

# Entity importance tiers. Omit the whole block to take the defaults shown below.
# strategy: percentile cuts thresholds from THIS book's own distribution, so tiers
# are not comparable across tomes; absolute uses fixed counts, stable in a series.
#
# notability:
#   strategy: percentile
#   percentiles: { principal: 0.90, secondary: 0.60, figurant: 0.10 }
#   min_entities_for_percentile: 4   # under this many entities of a type, percentiles are meaningless
#   fallback_absolute: { principal: 20, secondary: 10, figurant: 3 }
#   per_type:                        # keys are entity types, not domain nouns
#     EVENT: { strategy: absolute, principal: 5, secondary: 2, figurant: 1 }
#     PERSON:
#       strategy: absolute
#       principal: { min_mentions: 50, min_chapters: 15 }   # a tier needs BOTH gates
#       secondary: { min_mentions: 10, min_chapters: 3 }
#       figurant: { min_mentions: 3 }

generation:
  # STU-507: the posture is declared, not inherited from anti-hallucination prompting.
  editorial_stance:
    mode: hybrid                # in_universe | out_of_universe | hybrid
    hybrid_exceptions: [references_section, narrative_role_section]
    expose_pipeline_metadata: true
    expose_importance_tier: true
    forbid_author_mentions: true
  chapter_summary:
    mode: llm
    max_bullets: 8
    llm_fallback_to_extractive: true
    llm_model: qwen2.5
    llm_timeout_seconds: 45
  chapter_summary_max_chapters_per_entity: 20
  principal:
    sections: [infobox, biography, backstory, narrative_role, personality, physical, powers, relationships, trivia, references]
    sections_by_type:
      PLACE: [infobox, biography, physical, events, relationships, trivia, references]
      ORG: [infobox, biography, relationships, references]
      EVENT: [infobox, biography, relationships, references]
    max_tokens_per_page: 2000
  secondary:
    sections: [infobox, biography, backstory, narrative_role, relationships, references]
    sections_by_type:
      PLACE: [infobox, biography, events, references]
    max_tokens_per_page: 800
  figurant:
    sections: [infobox, biography]
    sections_by_type:
      PLACE: [infobox, biography, events]
    max_tokens_per_page: 200

export:
  categories:
    language: en
    labels:
      persons: Characters
      principal: Main Characters
      secondary: Secondary Characters
      locations: Locations
      organizations: Organizations

classification:
  concept_keywords:
    - wyrd
    - wyrdmark
    - wyrdmarks
    - magic
    - marque
    - marques
    - spell
    - spells
    - sigil
    - sigils
    - symbol
    - symbols
    - système
    - systeme
    - system
  role_words:
    - crown prince
    - assassin
    - champion
    - "king's champion"
    - "adarlan's assassin"
    - queen
    - king
    - prince
    - princess
    - lady
    - lord
    - captain
    - guard
    - master
  # Roles this novel uses, bare, as a name for one particular character: "the
  # Crown Prince" is always Dorian, "the Captain" always Chaol. Not "king" —
  # Adarlan's king and Brannon both wear it, so bare "King" names nobody.
  roles_naming_one_character:
    - crown prince
    - captain

  role_patterns:
    - '\b[a-z][a-z''\- ]*assassin\b'
    - '\b[a-z][a-z''\- ]*champion\b'
    - '\bking''?s champion\b'

entity_overrides:
  Nothung:
    force_type: OTHER
    exclude: true
  Adarlan:
    force_type: PLACE
  Eyllwe:
    force_type: PLACE
  Erilea:
    force_type: PLACE
  Terrasen:
    force_type: PLACE
  Endovier:
    force_type: PLACE
  Rifthold:
    force_type: PLACE
  Anielle:
    force_type: PLACE
  Calaculla:
    force_type: PLACE
  Perranth:
    force_type: PLACE
  Oakwald:
    force_type: PLACE

validation:
  series: Throne of Glass
  forbidden_series:
    - Kingkiller Chronicle
    - A Court of Thorns and Roses
    - An Ember in the Ashes
    - The Selection
    - Daughter of Smoke and Bone
  forbidden_names:
    - Aelin Galathynius
    - Aelin
 
