# Canon policy for the Inheritance Cycle series (STU-515).
#
# One EPUB per tome, sovereign de facto — nothing to arbitrate within a tome
# today. This file writes that rule down before a second source of truth on the
# same content (scripts/scrape_fandom.py, currently LoRA-dataset only) is ever
# wired into wiki generation.
#
# later_tome_overrides: false keeps the historical cross-tome rule (an earlier
# tome wins a conflicting entity_type, warning only). Byte-identical output.
#
# Consumed by scripts/parse_epub.py (resolves which source is read) and
# scripts/write_registry.py (arbitrates cross-tome Registry.accumulate).
canon:
  primary_source: epub
  sources:
    - id: epub_en_inheritance_01
      type: epub
      book: 01_eragon
      path: books/01_eragon.epub
      authority: 100
    - id: epub_en_inheritance_02
      type: epub
      book: 02_eldest
      path: books/02_eldest.epub
      authority: 100
    - id: epub_en_inheritance_03
      type: epub
      book: 03_brisingr
      path: books/03_brisingr.epub
      authority: 100
    - id: epub_en_inheritance_04
      type: epub
      book: 04_inheritance
      path: books/04_inheritance.epub
      authority: 100
    - id: epub_en_inheritance_045
      type: epub
      book: 04.5_tales-of-alagaesia
      path: books/04.5_tales-of-alagaesia.epub
      authority: 100
    - id: epub_en_inheritance_05
      type: epub
      book: 05_murtagh
      path: books/05_murtagh.epub
      authority: 100
  conflict_resolution:
    strategy: highest_authority  # highest_authority | primary_wins | flag_for_review
    on_unresolved: flag          # flag (warn, fall back to primary) | fail (raise)
  cross_tome:
    later_tome_overrides: false
