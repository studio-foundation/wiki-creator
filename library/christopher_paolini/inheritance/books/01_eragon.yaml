description: |
  Build a wiki for "Eragon" by Christopher Paolini,
  book 1 of the Inheritance Cycle.
  Parse the book, extract all named entities (characters, locations, organizations, events),
  resolve aliases, and generate Markdown wiki pages for each entity.

file_path: library/christopher_paolini/inheritance/books/01_eragon.epub
spacy_model: en_core_web_lg
ner:
  # Garrow, Durza, Ra'zac, Alagaesia: names spaCy has never read, so it types
  # them ORG — on Eragon it called the uncle who raises Eragon (112 mentions) and
  # the book's antagonist organisations. A prompt-typed model finds the entities
  # instead (STU-537).
  invented_names: true
coref: false
workers: 8

# Absolute pre-filter applied before clustering/classification:
# entities with total mentions below this value are dropped early.
min_mentions_absolute: 3

# Entity importance tiers (STU-513). strategy: absolute — the cuts below are the
# 0.90/0.60/0.10 percentiles of the SERIES-POOLED mention distribution, not this
# tome's own, so a given mention count means the same tier in every tome. Under
# the percentile default the same character could rank LOWER while being
# mentioned MORE (11 such inversions across the series); a global cut makes
# that impossible by construction.
# EVENT/OTHER take fallback_absolute: too few samples (7 EVENT pooled over the
# whole series) to cut a threshold from, and on this series the type holds only
# misclassifications.
notability:
  strategy: absolute
  fallback_absolute: { principal: 41, secondary: 9, figurant: 3 }
  per_type:
    PLACE: { principal: 48, secondary: 16, figurant: 3 }
    ORG: { principal: 63, secondary: 6, figurant: 3 }

generation:
  chapter_summary:
    mode: llm
    max_bullets: 8
    llm_fallback_to_extractive: true
    llm_model: qwen2.5
    llm_timeout_seconds: 45
  chapter_summary_max_chapters_per_entity: 20
  principal:
    sections: [infobox, biography, personality, physical, powers, relationships, trivia, references]
    sections_by_type:
      PLACE: [infobox, biography, physical, relationships, trivia, references]
      ORG: [infobox, biography, relationships, references]
      EVENT: [infobox, biography, relationships, references]
    max_tokens_per_page: 2000
  secondary:
    sections: [infobox, biography, relationships, references]
    max_tokens_per_page: 800
  figurant:
    sections: [infobox, biography]
    max_tokens_per_page: 200

export:
  categories:
    language: en
    labels:
      persons: Characters
      principal: Main Characters
      secondary: Secondary Characters
      locations: Locations
      organizations: Organizations

classification:
  # The bonds this world runs on. Flattened into the generic vocabulary, the
  # Rider-dragon link reads "allié" and carranam reads "autre" — the two things a
  # reader opens an Alagaësia wiki for (STU-472).
  relationship_types:
    - name: lien de Dragonnier
      description: >-
        The magical, lifelong bond between a Dragon Rider and their dragon, formed
        when the dragon hatches for them. The pair share thought and sensation. It
        outranks every generic type: a Rider and their own dragon are never merely
        allies or friends.
    - name: carranam
      description: >-
        Two magicians whose minds are joined so they can cast as one, sharing
        strength in the ancient language. Applies only to the magical joining
        itself, not to any ordinary bond between two spellcasters.
  concept_keywords:
    - magic
    - spell
    - spells
    - ancient language
    - the ancient language
    - eldunarí
    - eldunari
    - gedwëy ignasia
    - wyrda
    - true name
    - true names
  role_words:
    - dragon rider
    - rider
    - riders
    - dragon
    - king
    - queen
    - prince
    - princess
    - elf
    - dwarf
    - urgal
    - shade
    - spellcaster
    - sorcerer
    - witch
  role_patterns:
    - '\b[a-z][a-z''\- ]*rider\b'

entity_overrides:
  Alagaësia:
    force_type: PLACE
  Alagaesia:
    force_type: PLACE
  Carvahall:
    force_type: PLACE
  Palancar Valley:
    force_type: PLACE
  Ellesméra:
    force_type: PLACE
  Ellesmera:
    force_type: PLACE
  Tronjheim:
    force_type: PLACE
  Farthen Dûr:
    force_type: PLACE
  Du Weldenvarden:
    force_type: PLACE
  Urû'baen:
    force_type: PLACE
  Uru'baen:
    force_type: PLACE
  Teirm:
    force_type: PLACE
  Gil'ead:
    force_type: PLACE
  Varden:
    force_type: ORG
  Empire:
    force_type: ORG

validation:
  series: The Inheritance Cycle
  forbidden_series:
    - The Lord of the Rings
    - A Song of Ice and Fire
    - The Wheel of Time
    - Harry Potter
