description: |
  Build a wiki for "A Wild and Ruined Song" by Ashley Shuttlesworth,
  book 4 of the Hollow Star Saga.
  Parse the book, extract all named entities (characters, locations, organizations, events),
  resolve aliases, and generate Markdown wiki pages for each entity.

file_path: library/ashley_shuttlesworth/hollow_star_saga/books/04_a-wild-and-ruined-song.epub
spacy_model: en_core_web_lg
coref: false
workers: 8
novel_summary: |
  In the saga's finale, the war for the fate of both worlds comes to a head. Arlo Jarsdel must
  master the full, dangerous scope of her magic, while Nausicaä confronts the gods and the ruin of
  her own long past. Vehan and Aurelian make their final stand against the crown that betrayed
  them, and old alliances are tested as the alchemical threat reaches its terrible culmination.
  With the Courts on the brink and the heavens themselves in play, the four allies gamble
  everything on one last, wild song — knowing that whatever they win will be paid for in loss.

# Absolute pre-filter applied before clustering/classification:
# entities with total mentions below this value are dropped early.
min_mentions_absolute: 3

# Entity importance tiers (STU-513). strategy: absolute — the cuts below are the
# 0.90/0.60/0.10 percentiles of the SERIES-POOLED mention distribution, not this
# tome's own, so a given mention count means the same tier in every tome. Under
# the percentile default the same character could rank LOWER while being
# mentioned MORE (4 such inversions across the series); a global cut makes
# that impossible by construction.
# EVENT/OTHER take fallback_absolute: too few samples (0 EVENT pooled over the
# whole series) to cut a threshold from, and on this series the type holds only
# misclassifications.
notability:
  strategy: absolute
  fallback_absolute: { principal: 40, secondary: 10, figurant: 3 }
  per_type:
    PLACE: { principal: 13, secondary: 8, figurant: 3 }
    ORG: { principal: 9, secondary: 4, figurant: 3 }

generation:
  chapter_summary:
    mode: llm
    max_bullets: 8
    llm_fallback_to_extractive: true
    llm_model: qwen2.5
    llm_timeout_seconds: 45
  chapter_summary_max_chapters_per_entity: 20
  principal:
    sections: [infobox, biography, personality, physical, powers, relationships, trivia, references]
    sections_by_type:
      PLACE: [infobox, biography, physical, relationships, trivia, references]
      ORG: [infobox, biography, relationships, references]
      EVENT: [infobox, biography, relationships, references]
    max_tokens_per_page: 2000
  secondary:
    sections: [infobox, biography, relationships, references]
    max_tokens_per_page: 800
  figurant:
    sections: [infobox, biography]
    max_tokens_per_page: 200

export:
  categories:
    language: en
    labels:
      persons: Characters
      principal: Main Characters
      secondary: Secondary Characters
      locations: Locations
      organizations: Organizations

classification:
  concept_keywords:
    - alchemy
    - alchemical
    - philosopher's stone
    - philosophers stone
    - cauldron
    - magic
    - cascade
    - cascades
    - the sight
    - spell
    - spells
    - ley line
    - ley lines
    - egress
  role_words:
    - fae
    - faerie
    - faeries
    - prince
    - princess
    - king
    - queen
    - ironborn
    - lesidhe
    - lesserfae
    - fury
    - furies
    - immortal
    - seelie
    - unseelie
    - changeling
    - alchemist
    - god
    - goddess
  role_patterns:
    - '\b[a-z][a-z''\- ]*prince\b'
    - '\b[a-z][a-z''\- ]*queen\b'

entity_overrides:
  Toronto:
    force_type: PLACE
  Nevada:
    force_type: PLACE
  Las Vegas:
    force_type: PLACE
  Faerie:
    force_type: PLACE
  Seelie:
    force_type: ORG
  UnSeelie:
    force_type: ORG

validation:
  series: The Hollow Star Saga
  forbidden_series:
    - A Court of Thorns and Roses
    - The Folk of the Air
    - The Iron Fey
    - Wicked Lovely
    - The Mortal Instruments

# Semantic embedding disambiguation (STU-468). Opt-in, defaults OFF.
# NOTE: the STU-468 eval falsified the centroid-cosine approach on single-book
# data (same/different pairs are not separable — topic/setting dominates the
# embedding). Kept as inert infrastructure; do NOT enable without a working
# representation. See docs/superpowers/specs/2026-07-12-embedding-disambiguation-EVAL-RESULTS.md
embedding_disambiguation:
  enabled: false
  model: intfloat/multilingual-e5-small
  device: null              # null = auto (cuda if available, else cpu)
  propose_threshold: 0.86   # placeholder — no viable threshold exists on current data
  veto_threshold: 0.80
